name: Web CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "packages/catalog/**"
      - "data/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "packages/catalog/**"
      - "data/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @auto/core test
      - run: pnpm --filter @auto/web typecheck
      - run: pnpm --filter @auto/web build
